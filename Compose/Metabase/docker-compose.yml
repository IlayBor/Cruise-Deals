services:
  metabase-postgres:
    image: postgres:17
    container_name: metabase-postgres
    hostname: metabase-postgres
    environment:
      POSTGRES_USER: ilaybor
      POSTGRES_DB: metabaseappdb
      POSTGRES_PASSWORD: 24342434
    ports:
      - "5433:5432"
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data
    networks:
      - cruise-deals-network

  # Metabase
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    depends_on:
      - metabase-postgres
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_PORT: 5432
      MB_DB_USER: ilaybor
      MB_DB_PASS: 24342434
      MB_DB_HOST: metabase-postgres
    ports:
      - 4000:3000
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cruise-deals-network

volumes:
  metabase_postgres_data: